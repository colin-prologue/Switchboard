[project]
name = "switchboard-orchestrator"
version = "0.1.0"
description = "Symphony-derived orchestrator bound to Claude (execution) and GitHub Issues (tracker). Generated from spec/SPEC.md + spec/SPEC.core.md."
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "httpx>=0.27",
    "python-liquid>=1.12",
    "pyjwt[crypto]>=2.8",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
